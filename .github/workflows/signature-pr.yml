name: Signature PR

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      github:
        description: GitHub handle to use in the generated test signature.
        required: true
        type: string
      name:
        description: Display name to use in the generated test signature.
        required: true
        default: AIDD Test Signature
        type: string
      linkedin:
        description: Optional LinkedIn URL.
        required: false
        type: string
      affiliation:
        description: Optional affiliation.
        required: false
        default: Test run
        type: string
      statement:
        description: Optional statement.
        required: false
        default: Test-mode signature; do not merge.
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: signature-pr-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  create-signature-pr:
    if: github.event_name == 'workflow_dispatch' || (github.event.issue.state == 'open' && (contains(github.event.issue.labels.*.name, 'signature-request') || (startsWith(github.event.issue.title, 'Signature:') && contains(github.event.issue.body, '### Display name'))))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Read signature request
        id: request
        continue-on-error: true
        env:
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: node .github/scripts/read-signature-request.js

      - name: Report invalid signature request
        if: steps.request.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number || '' }}
        run: |
          if [ -n "$ISSUE_NUMBER" ]; then
            gh issue comment "$ISSUE_NUMBER" --body "Signature request could not be processed. Please check the form fields and submit again."
            gh issue edit "$ISSUE_NUMBER" --add-label "signature-needs-fix" || true
          fi
          exit 1

      - name: Create signature pull request
        if: steps.request.outcome == 'success'
        env:
          AFFILIATION_YAML: ${{ steps.request.outputs.affiliation_yaml }}
          BRANCH: ${{ steps.request.outputs.branch }}
          DISPLAY_NAME: ${{ steps.request.outputs.name }}
          DRAFT: ${{ steps.request.outputs.draft }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_HANDLE: ${{ steps.request.outputs.github }}
          ISSUE_NUMBER: ${{ steps.request.outputs.issue_number }}
          LINKEDIN_YAML: ${{ steps.request.outputs.linkedin_yaml }}
          NAME_YAML: ${{ steps.request.outputs.name_yaml }}
          SIGNATURE_PATH: ${{ steps.request.outputs.path }}
          STATEMENT_YAML: ${{ steps.request.outputs.statement_yaml }}
        run: |
          set -euo pipefail

          add_label() {
            local label="$1"
            if [ -n "$ISSUE_NUMBER" ]; then
              gh issue edit "$ISSUE_NUMBER" --add-label "$label" || true
            fi
          }

          write_signature_file() {
            mkdir -p "$(dirname "$SIGNATURE_PATH")"
            {
              echo "github: $GITHUB_HANDLE"
              echo "name: $NAME_YAML"
              if [ -n "$LINKEDIN_YAML" ]; then echo "linkedin: $LINKEDIN_YAML"; fi
              if [ -n "$AFFILIATION_YAML" ]; then echo "affiliation: $AFFILIATION_YAML"; fi
              if [ -n "$STATEMENT_YAML" ]; then echo "statement: $STATEMENT_YAML"; fi
            } > "$SIGNATURE_PATH"
          }

          write_pr_body() {
            PR_BODY_FILE="$RUNNER_TEMP/signature-pr-body.md"
            if [ "$DRAFT" = "true" ]; then
              cat > "$PR_BODY_FILE" <<'BODY'
          Test-mode signature PR.

          Do not merge. Success means the generated diff is correct and validation can run.
          BODY
            else
              cat > "$PR_BODY_FILE" <<BODY
          Automated signature PR from the GitHub Issue Form.

          GitHub handle: @$GITHUB_HANDLE

          Maintainer action: review the generated YAML, wait for validation, then merge if accepted.
          BODY
            fi
          }

          if [ -f "$SIGNATURE_PATH" ]; then
            if [ -n "$ISSUE_NUMBER" ]; then
              gh issue comment "$ISSUE_NUMBER" --body "@$GITHUB_HANDLE is already in the signature registry."
              add_label "signature-duplicate"
            fi
            echo '{"status":"duplicate"}'
            exit 0
          fi

          if [ -n "$ISSUE_NUMBER" ]; then
            existing_pr="$(gh pr list --head "$BRANCH" --state open --json url --jq '.[0].url // ""')"
            if [ -n "$existing_pr" ]; then
              gh issue comment "$ISSUE_NUMBER" --body "A signature pull request is already open: $existing_pr"
              echo "{\"status\":\"existing-pr\",\"url\":\"$existing_pr\"}"
              exit 0
            fi
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$BRANCH"
          write_signature_file
          git add "$SIGNATURE_PATH"

          if [ "$DRAFT" = "true" ]; then
            COMMIT_MESSAGE="[TEST] Add signature for $GITHUB_HANDLE"
            PR_TITLE="[TEST] Add signature: $DISPLAY_NAME"
          else
            COMMIT_MESSAGE="Add signature for $GITHUB_HANDLE"
            PR_TITLE="Add signature: $DISPLAY_NAME"
          fi

          git commit -m "$COMMIT_MESSAGE"
          git push -u origin "$BRANCH"
          write_pr_body

          if [ "$DRAFT" = "true" ]; then
            pr_url="$(gh pr create --draft --title "$PR_TITLE" --body-file "$PR_BODY_FILE" --head "$BRANCH" --base main)"
          else
            pr_url="$(gh pr create --title "$PR_TITLE" --body-file "$PR_BODY_FILE" --head "$BRANCH" --base main)"
          fi

          if [ -n "$ISSUE_NUMBER" ]; then
            gh issue comment "$ISSUE_NUMBER" --body "Created signature pull request: $pr_url"
            add_label "signature-pr-created"
            gh issue close "$ISSUE_NUMBER" --reason completed
          fi

          echo "{\"status\":\"created\",\"url\":\"$pr_url\"}"
