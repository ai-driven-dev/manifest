name: Signature PR

on:
  issues:
    types: [opened]

# The job acts as the signature bot App, not as GITHUB_TOKEN, so the workflow
# token itself needs nothing beyond reading the checked-out ref.
permissions:
  contents: read

concurrency:
  group: signature-pr-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  create-signature-pr:
    # The label is applied server-side by the Issue Form and cannot be set by a
    # contributor without triage rights. Title and body can, so they are not a
    # trigger. Delete the label and this workflow stops firing.
    if: github.event.issue.state == 'open' && contains(github.event.issue.labels.*.name, 'signature-request')
    runs-on: ubuntu-latest
    steps:
      # A pull request opened by GITHUB_TOKEN leaves its Validate run stuck on
      # action_required, so the required `build` check never reports and the
      # signature PR can never merge. An App installation token is a distinct
      # actor, so the run starts on its own.
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.SIGNATURE_BOT_APP_ID }}
          private-key: ${{ secrets.SIGNATURE_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Read signature request
        id: request
        continue-on-error: true
        env:
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: node .github/scripts/read-signature-request.js

      - name: Report invalid signature request
        if: steps.request.outcome == 'failure'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "Signature request could not be processed. Check the form fields and open a new request: editing this issue does not re-run the workflow, which only reacts to newly opened issues."
          gh issue edit "$ISSUE_NUMBER" --add-label "signature-needs-fix" || true
          gh issue close "$ISSUE_NUMBER" --reason "not planned"
          exit 1

      - name: Stop duplicate signature
        id: duplicate
        if: steps.request.outcome == 'success'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_HANDLE: ${{ steps.request.outputs.github }}
          ISSUE_NUMBER: ${{ steps.request.outputs.issue_number }}
          SIGNATURE_PATH: ${{ steps.request.outputs.path }}
        run: |
          if [ ! -f "$SIGNATURE_PATH" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          gh issue comment "$ISSUE_NUMBER" --body "@$GITHUB_HANDLE is already in the signature registry."
          gh issue edit "$ISSUE_NUMBER" --add-label "signature-duplicate" || true
          gh issue close "$ISSUE_NUMBER" --reason "not planned"
          echo "found=true" >> "$GITHUB_OUTPUT"

      - name: Stop existing pull request
        id: existing-pr
        if: steps.duplicate.outputs.found == 'false'
        env:
          # Every signature branch for a handle shares this prefix; the issue
          # number is appended. Matching the full branch would only ever catch a
          # re-run of the same issue, never a second request from the same signer.
          BRANCH_PREFIX: signature/${{ steps.request.outputs.github }}-
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_HANDLE: ${{ steps.request.outputs.github }}
          ISSUE_NUMBER: ${{ steps.request.outputs.issue_number }}
        run: |
          pr_url="$(gh pr list --state open --json url,headRefName \
            --jq '[.[] | select(.headRefName | startswith(env.BRANCH_PREFIX))] | .[0].url // ""')"
          echo "url=$pr_url" >> "$GITHUB_OUTPUT"

          if [ -n "$pr_url" ]; then
            gh issue comment "$ISSUE_NUMBER" --body "A signature pull request is already open for @$GITHUB_HANDLE: $pr_url"
            gh issue edit "$ISSUE_NUMBER" --add-label "signature-pr-created" || true
            gh issue close "$ISSUE_NUMBER" --reason "not planned"
          fi

      - name: Write signature file
        if: steps.request.outcome == 'success' && steps.duplicate.outputs.found == 'false' && steps.existing-pr.outputs.url == ''
        env:
          AFFILIATION_YAML: ${{ steps.request.outputs.affiliation_yaml }}
          GITHUB_HANDLE: ${{ steps.request.outputs.github }}
          LINKEDIN_YAML: ${{ steps.request.outputs.linkedin_yaml }}
          NAME_YAML: ${{ steps.request.outputs.name_yaml }}
          SIGNATURE_PATH: ${{ steps.request.outputs.path }}
          STATEMENT_YAML: ${{ steps.request.outputs.statement_yaml }}
        run: |
          mkdir -p "$(dirname "$SIGNATURE_PATH")"
          {
            echo "github: $GITHUB_HANDLE"
            echo "name: $NAME_YAML"
            [ -n "$LINKEDIN_YAML" ] && echo "linkedin: $LINKEDIN_YAML"
            [ -n "$AFFILIATION_YAML" ] && echo "affiliation: $AFFILIATION_YAML"
            [ -n "$STATEMENT_YAML" ] && echo "statement: $STATEMENT_YAML"
          } > "$SIGNATURE_PATH"

      - name: Commit signature file
        if: steps.request.outcome == 'success' && steps.duplicate.outputs.found == 'false' && steps.existing-pr.outputs.url == ''
        env:
          BRANCH: ${{ steps.request.outputs.branch }}
          GITHUB_HANDLE: ${{ steps.request.outputs.github }}
          SIGNATURE_PATH: ${{ steps.request.outputs.path }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$BRANCH"
          git add "$SIGNATURE_PATH"
          git commit -m "Add signature for $GITHUB_HANDLE"
          git push -u origin "$BRANCH"

      - name: Open signature pull request
        id: pull-request
        if: steps.request.outcome == 'success' && steps.duplicate.outputs.found == 'false' && steps.existing-pr.outputs.url == ''
        env:
          BRANCH: ${{ steps.request.outputs.branch }}
          DISPLAY_NAME: ${{ steps.request.outputs.name }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_HANDLE: ${{ steps.request.outputs.github }}
        run: |
          pr_url="$(gh pr create \
            --title "Add signature: $DISPLAY_NAME" \
            --body "Automated signature PR from the GitHub Issue Form for @$GITHUB_HANDLE. Review the generated YAML and merge if accepted." \
            --head "$BRANCH" \
            --base main)"
          echo "url=$pr_url" >> "$GITHUB_OUTPUT"

      - name: Close signature issue
        if: steps.pull-request.outputs.url != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_NUMBER: ${{ steps.request.outputs.issue_number }}
          PR_URL: ${{ steps.pull-request.outputs.url }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "Created signature pull request: $PR_URL"
          gh issue edit "$ISSUE_NUMBER" --add-label "signature-pr-created" || true
          gh issue close "$ISSUE_NUMBER" --reason completed
